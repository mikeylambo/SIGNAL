<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#05080D"/>
  <!-- 3x3 grid of cubes, center one lit -->
  <rect x="4"  y="4"  width="7" height="7" rx="1" fill="#1F2A36"/>
  <rect x="13" y="4"  width="7" height="7" rx="1" fill="#1F2A36"/>
  <rect x="22" y="4"  width="7" height="7" rx="1" fill="#1F2A36"/>
  <rect x="4"  y="13" width="7" height="7" rx="1" fill="#1F2A36"/>
  <rect x="13" y="13" width="7" height="7" rx="1" fill="#00E5FF" filter="url(#glow)"/>
  <rect x="22" y="13" width="7" height="7" rx="1" fill="#1F2A36"/>
  <rect x="4"  y="22" width="7" height="7" rx="1" fill="#1F2A36"/>
  <rect x="13" y="22" width="7" height="7" rx="1" fill="#1F2A36"/>
  <rect x="22" y="22" width="7" height="7" rx="1" fill="#1F2A36"/>
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>
